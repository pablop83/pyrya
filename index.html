<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PYRYA — Coming 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'Geist', sans-serif;
      overflow: hidden;
    }

    /* ── Page wrapper ── */
    .page {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    /* ── Interactive map canvas ── */
    .map-wrapper {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #map-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      animation: map-fadein 1.2s ease-in forwards;
      animation-delay: 0.4s;
    }

    /* ── Nav bar ── */
    .navbar {
      z-index: 10;
      width: calc(100% - 107.78px); /* 53.89px each side */
      margin: 0 53.89px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      position: relative;
    }

    /* Map fade-in after nav — 3D perspective tilt from bottom */
    @keyframes map-fadein {
      from {
        opacity: 0;
        transform: perspective(1200px) rotateX(18deg) scale(0.8);
      }
      to {
        opacity: 1;
        transform: perspective(1200px) rotateX(0deg) scale(1);
      }
    }

    /* Nav elements slide up from 20px below */
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* True 0.5px border that animates left → right on load */
    @keyframes border-grow {
      from { width: 0; }
      to   { width: 100%; }
    }

    .navbar::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 1px;
      background: rgba(255, 255, 255, 0.9);
      transform: scaleY(0.5);
      transform-origin: bottom;
      animation: border-grow 1s ease-out forwards;
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      opacity: 0;
      animation: slide-up 0.6s ease-out forwards;
      animation-delay: 0.1s;
    }

    .logo img {
      width: 213.621px;
      height: 47.466px;
      display: block;
      object-fit: contain;
    }

    /* ── Nav left group (logo + tagline) ── */
    .nav-left {
      display: flex;
      align-items: center;
      gap: 56px;
      flex-shrink: 0;
    }

    /* ── Tagline ── */
    .tagline {
      font-family: 'Geist', sans-serif;
      font-weight: 300;
      font-size: 32px;
      font-style: normal;
      line-height: 1;
      letter-spacing: -1.6px;
      color: #fff;
      white-space: nowrap;
      opacity: 0;
      animation: slide-up 0.6s ease-out forwards;
      animation-delay: 0.2s;
    }

    /* ── Badge group ── */
    .badges {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      opacity: 0;
      animation: slide-up 0.6s ease-out forwards;
      animation-delay: 0.3s;
    }

    .badge {
      border: 1.048px solid #fff;
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .badge span {
      font-family: 'Geist', sans-serif;
      font-size: 18px;
      font-weight: 500;
      font-style: normal;
      line-height: normal;
      letter-spacing: -0.72px;
      text-transform: uppercase;
      color: #fff;
      white-space: nowrap;
    }

    /* Contacto CTA — white filled pill */
    .badge-cta {
      background: #fff;
      border: 1.048px solid #fff;
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-decoration: none;
      cursor: pointer;
      transition: gap 0.25s ease;
    }

    .badge-cta:hover {
      gap: 12px;
    }

    .badge-cta span {
      font-family: 'Geist', sans-serif;
      font-size: 18px;
      font-weight: 500;
      font-style: normal;
      line-height: normal;
      letter-spacing: -0.72px;
      text-transform: uppercase;
      color: #000;
      white-space: nowrap;
    }

    .badge-cta svg {
      flex-shrink: 0;
    }

    /* ── Mobile layout ── */
    .mobile-layout {
      display: none;
    }

    @media (max-width: 768px) {

      /* Hide desktop nav */
      .navbar {
        display: none;
      }

      /* Show mobile layout — use dvh so browser chrome doesn't eat the bottom */
      .mobile-layout {
        display: flex;
        position: relative;
        z-index: 10;
        flex-direction: column;
        justify-content: space-between;
        align-items: flex-start;
        width: 100%;
        height: 100vh;            /* fallback for older browsers */
        height: 100dvh;           /* dynamic — excludes browser chrome on Android/iOS */
        padding: 20px;
        padding-bottom: max(20px, calc(20px + env(safe-area-inset-bottom)));
      }

      .mobile-logo {
        opacity: 0;
        animation: slide-up 0.6s ease-out forwards;
        animation-delay: 0.1s;
      }

      .mobile-logo img {
        width: 213.621px;
        height: 47.466px;
        display: block;
        object-fit: contain;
      }

      .mobile-bottom {
        display: flex;
        flex-direction: column;
        gap: 24px;
        width: 100%;
        opacity: 0;
        animation: slide-up 0.6s ease-out forwards;
        animation-delay: 0.2s;
      }

      .mobile-tagline {
        font-family: 'Geist', sans-serif;
        font-weight: 300;
        font-size: 48px;
        line-height: 0.9;
        letter-spacing: -2.4px;
        color: #fff;
      }

      .mobile-separator {
        border-top: 0.5px solid rgba(255, 255, 255, 0.9);
        padding-top: 16px;
      }

      /* Reset badge animation on mobile (parent handles it) */
      .mobile-layout .badges {
        opacity: 1;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Interactive dotted world map -->
    <div class="map-wrapper">
      <canvas id="map-canvas" aria-hidden="true"></canvas>
    </div>

    <!-- Navigation bar -->
    <nav class="navbar" aria-label="Site header">
      <!-- Left group: logo + tagline -->
      <div class="nav-left">
        <div class="logo">
          <img
            src="https://www.figma.com/api/mcp/asset/ce9f9d85-af08-4604-919d-ddf02ef390c3"
            alt="PYRYA"
          />
        </div>
        <p class="tagline">El futuro del lavado está llegando</p>
      </div>

      <!-- Status badges + CTA -->
      <div class="badges" role="status" aria-label="Launching coming soon, 2026">
        <div class="badge">
          <span>Coming Soon</span>
        </div>
        <div class="badge">
          <span>2026</span>
        </div>
        <a class="badge-cta" href="mailto:contacto@pyrya.com" aria-label="Contacto">
          <span>Contacto</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 13L13 3M13 3H5M13 3V11" stroke="black" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </nav>

    <!-- Mobile layout -->
    <div class="mobile-layout">
      <!-- Logo top-left -->
      <div class="mobile-logo">
        <img
          src="https://www.figma.com/api/mcp/asset/ce9f9d85-af08-4604-919d-ddf02ef390c3"
          alt="PYRYA"
        />
      </div>

      <!-- Tagline + badges at bottom -->
      <div class="mobile-bottom">
        <p class="mobile-tagline">El futuro del lavado está llegando</p>
        <div class="mobile-separator">
          <div class="badges" role="status" aria-label="Launching coming soon, 2026">
            <div class="badge"><span>Coming Soon</span></div>
            <div class="badge"><span>2026</span></div>
            <a class="badge-cta" href="mailto:contacto@pyrya.com" aria-label="Contacto">
              <span>Contacto</span>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 13L13 3M13 3H5M13 3V11" stroke="black" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import DottedMap from 'https://esm.sh/dotted-map@1';

    const canvas = document.getElementById('map-canvas');
    const ctx = canvas.getContext('2d');

    // ── Config ──────────────────────────────────────────
    const DOT_COLOR       = '#232323';
    const DOT_BASE_RGB    = { r: 35,  g: 35,  b: 35  }; // #232323
    const DOT_HOVER_RGB   = { r: 136, g: 99,  b: 233 }; // #8863E9
    const DOT_RADIUS_BASE = 3;   // radius at 1920px reference width (6px diameter)
    const REPEL_RADIUS    = 160;   // px — how far the cursor influence reaches
    const REPEL_FORCE     = 7;     // how strongly dots are pushed
    const SPRING          = 0.055; // pull back to origin
    const DAMPING         = 0.78;  // velocity decay
    const GATHER_DURATION = 2000;  // ms — how long dots take to form the map
    // ────────────────────────────────────────────────────

    let dotRadius     = DOT_RADIUS_BASE;
    let animStartTime = null;   // set after first resize
    let animDone      = false;

    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

    // Generate world map points (diagonal grid, ~55 rows)
    const dottedMap = new DottedMap({ height: 90, grid: 'diagonal' });
    const mapPoints = dottedMap.getPoints();

    let dots = [];
    const mouse = { x: -9999, y: -9999 };

    function buildDots() {
      const W = canvas.offsetWidth;
      const H = canvas.offsetHeight;
      const mobile = W <= 768;

      // Find the bounding box of all map points
      let minX = Infinity, maxX = -Infinity;
      let minY = Infinity, maxY = -Infinity;
      for (const p of mapPoints) {
        if (p.x < minX) minX = p.x;
        if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.y > maxY) maxY = p.y;
      }

      const mapW = maxX - minX;
      const mapH = maxY - minY;

      let scale, offsetX, offsetY;

      if (mobile) {
        // Zoom in 3× natively — no CSS transform, so pixels stay sharp
        const zoomFactor = 3;
        scale = (W / mapW) * zoomFactor;

        // Focus centre on Americas: ~28% from left, ~42% from top of the logical map
        const focusX = minX + mapW * 0.28;
        const focusY = minY + mapH * 0.42;
        offsetX = W * 0.5 - focusX * scale;
        offsetY = H * 0.5 - focusY * scale - 100;

        // Keep dots at a comfortable physical size on mobile
        dotRadius = Math.max(1.5, DOT_RADIUS_BASE * (W / 390));
      } else {
        // Desktop: fill width, centre vertically, aspect-ratio locked
        scale = W / mapW;
        dotRadius = Math.max(1, DOT_RADIUS_BASE * (W / 1920));
        const scaledH = mapH * scale;
        offsetX = -minX * scale;
        offsetY = (H - scaledH) / 2 - minY * scale;
      }

      dots = mapPoints.map(p => {
        const ox = p.x * scale + offsetX;
        const oy = p.y * scale + offsetY;
        // On first build, start from a random scatter position
        const sx = animDone ? ox : Math.random() * W;
        const sy = animDone ? oy : Math.random() * H;
        return { ox, oy, sx, sy, x: sx, y: sy, vx: 0, vy: 0 };
      });
    }

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      const W = canvas.offsetWidth;
      const H = canvas.offsetHeight;
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      ctx.scale(dpr, dpr);
      buildDots();
      // Kick off scatter animation once, with same delay as CSS fade-in (0.4s)
      if (!animStartTime) animStartTime = performance.now() + 400;
    }

    function tick() {
      const W   = canvas.offsetWidth;
      const H   = canvas.offsetHeight;
      const now = performance.now();

      // Gather progress: 0 = fully scattered, 1 = fully formed
      let gatherP = 1;
      if (!animDone && animStartTime) {
        const raw = Math.min(1, Math.max(0, (now - animStartTime) / GATHER_DURATION));
        gatherP = easeOutCubic(raw);
        if (raw >= 1) animDone = true;
      }

      ctx.clearRect(0, 0, W, H);
      for (const d of dots) {
        // Current effective origin blends from scatter → map position
        const tx = lerp(d.sx, d.ox, gatherP);
        const ty = lerp(d.sy, d.oy, gatherP);

        // Repulsion from cursor (only meaningful once mostly gathered)
        const dx   = d.x - mouse.x;
        const dy   = d.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        let t = 0;
        if (dist < REPEL_RADIUS && dist > 0) {
          t = 1 - dist / REPEL_RADIUS;                  // 0→1 as cursor gets closer
          const force = t * t * REPEL_FORCE * gatherP;  // disabled while scattering
          d.vx += (dx / dist) * force;
          d.vy += (dy / dist) * force;
        }

        // Spring toward blended target (stronger pull during gather so dots keep up)
        const springF = animDone ? SPRING : SPRING + (1 - gatherP) * 0.15;
        d.vx += (tx - d.x) * springF;
        d.vy += (ty - d.y) * springF;

        // Damping
        d.vx *= DAMPING;
        d.vy *= DAMPING;

        d.x += d.vx;
        d.y += d.vy;

        // Interpolate colour: base → #8863E9 with gentle falloff from cursor
        const c = Math.pow(t, 1.5);
        const r = Math.round(DOT_BASE_RGB.r + c * (DOT_HOVER_RGB.r - DOT_BASE_RGB.r));
        const g = Math.round(DOT_BASE_RGB.g + c * (DOT_HOVER_RGB.g - DOT_BASE_RGB.g));
        const b = Math.round(DOT_BASE_RGB.b + c * (DOT_HOVER_RGB.b - DOT_BASE_RGB.b));
        ctx.fillStyle = `rgb(${r},${g},${b})`;

        // Draw
        ctx.beginPath();
        ctx.arc(d.x, d.y, dotRadius, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(tick);
    }

    // ── Pointer tracking (mouse + touch) ──────────────────
    function setMouseFromClient(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      mouse.x = clientX - rect.left;
      mouse.y = clientY - rect.top;
    }

    // Mouse (desktop)
    window.addEventListener('mousemove', e => setMouseFromClient(e.clientX, e.clientY));
    window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

    // Touch (mobile) — tap + drag both trigger repel
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.touches[0];
      setMouseFromClient(t.clientX, t.clientY);
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      setMouseFromClient(t.clientX, t.clientY);
    }, { passive: false });

    canvas.addEventListener('touchend', () => {
      // Fade out influence after lift — keep last position briefly then reset
      setTimeout(() => { mouse.x = -9999; mouse.y = -9999; }, 300);
    });

    window.addEventListener('resize', resize);
    resize();
    tick();
  </script>
</body>
</html>
